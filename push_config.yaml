title: 人的know-how，正在被更低成本地提取
content: |
  上周用了下同事.skill，用完感觉挺惊艳的。
  
  没想到这周还在持续扩散。
  
  说实话，我前几年就做过个人 Agent 方案，那时候主要靠 RAG 知识库——手动喂文档、搭向量库、调召回率，一套下来没几个月搞不定。
  
  但这两年模型能力起来了，同样的事情一个 Skill 就能搞定。范式越来越简单，门槛越来越低。
  
  最大的感受是：人的知识、特点、know-how，正在被更低成本地提取和复用。不是 AI 取代人，是会用 AI 的人虹吸不会用的人。
  
  #AI #Skill #效率 #产品经理 #个人助理
